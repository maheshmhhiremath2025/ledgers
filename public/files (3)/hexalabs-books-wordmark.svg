<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a"/>
      <stop offset="100%" style="stop-color:#0f1225"/>
    </linearGradient>
    <linearGradient id="b1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="b2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#C7D2FE"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect width="320" height="80" rx="16" fill="url(#bg)"/>

  <!-- Icon mark - stacked books -->
  <!-- Book 3 back -->
  <rect x="16" y="18" width="5" height="38" rx="2" fill="#C7D2FE" opacity="0.4"/>
  <rect x="21" y="18" width="24" height="38" rx="0 2 2 0" fill="#C7D2FE" opacity="0.2"/>
  <!-- Book 2 middle -->
  <rect x="14" y="22" width="5.5" height="32" rx="2" fill="url(#b1)" opacity="0.8"/>
  <rect x="19.5" y="22" width="26" height="32" rx="0 2 2 0" fill="#818CF8" opacity="0.65"/>
  <!-- Book 1 front -->
  <rect x="12" y="26" width="6" height="26" rx="2" fill="url(#b2)"/>
  <rect x="18" y="26" width="28" height="26" rx="0 2 2 0" fill="#4F46E5"/>
  <!-- Page edge -->
  <rect x="45" y="27" width="2" height="24" rx="1" fill="#E0E7FF" opacity="0.5"/>
  <!-- HL on cover -->
  <text x="20" y="44" font-family="Georgia,serif" font-size="13" font-weight="700" fill="white" opacity="0.95" filter="url(#glow)">HL</text>
  <!-- Bookmark -->
  <polygon points="38,26 43,26 43,36 40.5,33.5 38,36" fill="#F59E0B"/>
  <!-- Sparkle dots -->
  <circle cx="10" cy="26" r="2" fill="#6366F1" opacity="0.7"/>
  <circle cx="50" cy="42" r="1.5" fill="#818CF8" opacity="0.5"/>

  <!-- Divider line -->
  <rect x="62" y="22" width="1.5" height="36" rx="1" fill="#6366F1" opacity="0.3"/>

  <!-- Text: Hexalabs -->
  <text x="72" y="38" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="url(#textGrad)" letter-spacing="-0.5">Hexalabs</text>

  <!-- Text: Books -->
  <text x="73" y="57" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#818CF8" letter-spacing="3">BOOKS</text>

  <!-- Small accent under Hexalabs -->
  <rect x="72" y="42" width="120" height="1" rx="0.5" fill="#6366F1" opacity="0.2"/>
</svg>
