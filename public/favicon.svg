<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a"/>
      <stop offset="100%" style="stop-color:#0f1225"/>
    </linearGradient>
    <linearGradient id="b1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="b2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Book 3 back -->
  <rect x="7" y="9" width="3" height="14" rx="1" fill="#C7D2FE" opacity="0.5"/>
  <rect x="10" y="9" width="11" height="14" rx="0 1 1 0" fill="#C7D2FE" opacity="0.3"/>
  <!-- Book 2 middle -->
  <rect x="6" y="11" width="3" height="12" rx="1" fill="url(#b1)" opacity="0.8"/>
  <rect x="9" y="11" width="12" height="12" rx="0 1 1 0" fill="#818CF8" opacity="0.7"/>
  <!-- Book 1 front -->
  <rect x="5" y="13" width="3.5" height="10" rx="1" fill="url(#b2)"/>
  <rect x="8.5" y="13" width="13" height="10" rx="0 1 1 0" fill="#4F46E5"/>
  <rect x="21" y="13.5" width="1" height="9" rx="0.5" fill="#E0E7FF" opacity="0.5"/>
  <!-- HL text on front -->
  <text x="10" y="21" font-family="Georgia,serif" font-size="6" font-weight="700" fill="white" opacity="0.95">HL</text>
  <!-- Bookmark -->
  <polygon points="18,13 20,13 20,17.5 19,16.5 18,17.5" fill="#F59E0B"/>
  <!-- Sparkle -->
  <circle cx="4" cy="13" r="1" fill="#6366F1" opacity="0.7"/>
  <circle cx="25" cy="19" r="0.8" fill="#818CF8" opacity="0.6"/>
</svg>
